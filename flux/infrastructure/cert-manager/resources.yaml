---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@hydrahmlb.cc
    privateKeySecretRef:
      name: letsencrypt-cloudflare-private-key
    solvers:
      - dns01:
          cloudflare:
            email: me@leoxlin.com
            apiTokenSecretRef:
              name: cert-manager-secrets
              key: CLOUDFLARE_API_TOKEN
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hydrahmlb-tls
  namespace: istio-ingress
spec:
  secretName: hydrahmlb-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "*.hydrahmlb.cc"
    - "hydrahmlb.cc"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hydrahmlb-tls
  namespace: istio-public-ingress
spec:
  secretName: hydrahmlb-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - "*.hydrahmlb.cc"
    - "hydrahmlb.cc"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: singularr-app-tls
  namespace: istio-public-ingress
spec:
  secretName: singularr-app-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - singularr.app
    - www.singularr.app

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  releaseName: external-secrets
  interval: 30m
  chart:
    spec:
      chart: external-secrets
      version: "1.19.2"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  targetNamespace: external-secrets
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    installCRDs: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pangolin-client-marten
  namespace: pangolin-client
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pangolin-client
      app.kubernetes.io/instance: marten
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pangolin-client
        app.kubernetes.io/instance: marten
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: marten
      containers:
        - name: pangolin-client
          image: fosrl/pangolin-cli:latest
          envFrom:
            - secretRef:
                name: pangolin-client-secrets-marten
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun

---
apiVersion: v1
kind: Service
metadata:
  name: adguard-dns
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.3.53
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: adguard
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: adguard
spec:
  selector:
    app: adguard
  sessionAffinity: ClientIP
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: adguard
spec:
  hosts:
    - adguard.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: adguard.adguard.svc.cluster.local
            port:
              number: 3000

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adguard-config
data:
  AdGuardHome.yaml.tmpl: |
    http:
      address: 0.0.0.0:3000
      session_ttl: 720h
    users:
      - name: admin
        password: "${ADMIN_BCRYPT_HASH}"
    auth_attempts: 5
    block_auth_min: 15
    dns:
      bind_hosts:
        - 0.0.0.0
      port: 53
      anonymize_client_ip: false
      protection_enabled: true
      filtering_enabled: true
      blocking_mode: default
      ratelimit: 0
      upstream_dns:
        - https://dns.cloudflare.com/dns-query
        - https://dns.quad9.net/dns-query
      upstream_mode: load_balance
      bootstrap_dns:
        - 1.1.1.1
      fallback_dns:
        - 1.0.0.1
      cache_size: 16777216
      cache_ttl_min: 60
      cache_ttl_max: 86400
      cache_optimistic: true
      use_private_ptr_resolvers: true
      local_ptr_upstreams:
        - 192.168.2.1
      enable_dnssec: true
      edns_client_subnet:
        enabled: false
        use_custom: false
    tls:
      enabled: false
    querylog:
      enabled: true
      file_enabled: true
      interval: 24h
      size_memory: 1000
    statistics:
      enabled: true
      interval: 24h
    filters:
      - enabled: true
        url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
        name: AdGuard DNS filter
        id: 1
      - enabled: true
        url: https://adaway.org/hosts.txt
        name: AdAway Default Blocklist
        id: 2
    whitelist_filters: []
    user_rules: []
    rewrites:
      - domain: hydrahmlb.cc
        answer: 192.168.3.10
      - domain: "*.hydrahmlb.cc"
        answer: 192.168.3.10
    dhcp:
      enabled: false
    clients:
      runtime_sources:
        whois: true
        arp: true
        rdns: true
        dhcp: false
        hosts: true
      persistent: []
    log_file: ""
    log_max_backups: 0
    log_max_size: 100
    log_max_age: 3
    log_compress: false
    log_localtime: false
    verbose: false
    os:
      group: ""
      user: ""
      rlimit_nofile: 0
    schema_version: 28

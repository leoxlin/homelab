---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard
  labels:
    app: adguard
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: adguard
  template:
    metadata:
      labels:
        app: adguard
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: adguard
      initContainers:
        - name: seed-config
          image: alpine:3
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache gettext
              envsubst '$ADMIN_BCRYPT_HASH' \
                < /config-src/AdGuardHome.yaml.tmpl \
                > /opt/adguardhome/conf/AdGuardHome.yaml
          env:
            - name: ADMIN_BCRYPT_HASH
              valueFrom:
                secretKeyRef:
                  name: adguard-secrets
                  key: ADMIN_BCRYPT_HASH
          volumeMounts:
            - name: config-src
              mountPath: /config-src
            - name: conf
              mountPath: /opt/adguardhome/conf
      containers:
        - name: adguard
          # renovate: datasource=docker depName=adguard/adguardhome
          image: adguard/adguardhome:v0.107.78
          args:
            - --no-check-update
            - --config
            - /opt/adguardhome/conf/AdGuardHome.yaml
            - --work-dir
            - /opt/adguardhome/work
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: conf
              mountPath: /opt/adguardhome/conf
            - name: work
              mountPath: /opt/adguardhome/work
          livenessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config-src
          configMap:
            name: adguard-config
        - name: conf
          emptyDir: {}
        - name: work
          emptyDir: {}

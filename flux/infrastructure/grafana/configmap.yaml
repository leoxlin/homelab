---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
data:
  # Database
  GF_DATABASE_TYPE: "postgres"
  GF_DATABASE_HOST: "grafana-pg-rw.monitoring.svc.cluster.local:5432"
  GF_DATABASE_NAME: "app"
  GF_DATABASE_USER: "app"
  GF_DATABASE_SSL_MODE: "disable"
  # Server
  GF_SERVER_HTTP_PORT: "3000"
  GF_SERVER_ROOT_URL: "https://grafana.hydrahmlb.cc"
  # OIDC
  GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
  GF_AUTH_GENERIC_OAUTH_NAME: "Authentik"
  GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"
  GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://authentik.hydrahmlb.cc/application/o/authorize/"
  GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://authentik.hydrahmlb.cc/application/o/token/"
  GF_AUTH_GENERIC_OAUTH_API_URL: "https://authentik.hydrahmlb.cc/application/o/userinfo/"
  GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: "preferred_username"
  GF_AUTH_GENERIC_OAUTH_GROUPS_ATTRIBUTE_PATH: "groups"
  GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: "name"
  GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
  GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "true"
  # Role mapping
  # "contains(groups, 'Grafana Admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'"
  GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "'Admin'"

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: flux-system
spec:
  releaseName: metallb
  interval: 30m
  chart:
    spec:
      chart: metallb
      version: "0.16.1"
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
  targetNamespace: metallb-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controller:
      logLevel: info
    speaker:
      logLevel: info
      tolerations:
        - key: node-role.kubernetes.io/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
      frrk8s:
        enabled: true
    frr-k8s:
      frrk8s:
        tolerations:
          - key: node-role.kubernetes.io/storage
            operator: Equal
            value: "true"
            effect: NoSchedule

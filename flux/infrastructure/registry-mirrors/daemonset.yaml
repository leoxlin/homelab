---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: registry-mirrors
  namespace: kube-system
  labels:
    app.kubernetes.io/name: registry-mirrors
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: registry-mirrors
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry-mirrors
    spec:
      hostPID: false
      hostNetwork: false
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      containers:
        - name: registry-config
          image: alpine:3
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache gettext
              CONFIG_DIR="/etc/rancher/k3s"
              CONFIG_FILE="${CONFIG_DIR}/registries.yaml"
              mkdir -p "${CONFIG_DIR}"
              while true; do
                envsubst < /config/registries.yaml.tmpl > "${CONFIG_FILE}.tmp"
                if ! cmp -s "${CONFIG_FILE}.tmp" "${CONFIG_FILE}" 2>/dev/null; then
                  mv "${CONFIG_FILE}.tmp" "${CONFIG_FILE}"
                  echo "$(date): Registry config updated"
                else
                  rm "${CONFIG_FILE}.tmp"
                  echo "$(date): Registry config unchanged"
                fi
                sleep 3600
              done
          env:
            - name: REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: registry-mirrors-secrets
                  key: username
            - name: REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: registry-mirrors-secrets
                  key: password
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: temp
              mountPath: /temp
            - name: k3s-config
              mountPath: /etc/rancher/k3s
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: registry-mirrors-config
            defaultMode: 0755
        - name: temp
          emptyDir: {}
        - name: k3s-config
          hostPath:
            path: /etc/rancher/k3s
            type: DirectoryOrCreate

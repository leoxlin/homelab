---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  releaseName: longhorn
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.12.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  targetNamespace: longhorn-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    defaultSettings:
      createDefaultDiskLabeledNodes: true
      taintToleration: node-role.kubernetes.io/storage=true:NoSchedule
    longhornManager:
      tolerations:
        - key: node-role.kubernetes.io/storage
          operator: Equal
          value: "true"
          effect: NoSchedule

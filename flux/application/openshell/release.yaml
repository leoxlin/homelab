---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openshell
  namespace: flux-system
spec:
  releaseName: openshell
  interval: 30m
  chart:
    spec:
      chart: helm-chart
      version: "0.0.59"
      sourceRef:
        kind: HelmRepository
        name: openshell
        namespace: flux-system
  targetNamespace: openshell
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: agent-sandbox
      namespace: flux-system
  values:
    replicaCount: 1
    server:
      disableTls: true

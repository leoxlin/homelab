---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agent-sandbox
  namespace: flux-system
spec:
  releaseName: agent-sandbox
  interval: 30m
  chart:
    spec:
      chart: ./helm
      sourceRef:
        kind: GitRepository
        name: agent-sandbox
        namespace: flux-system
  targetNamespace: agent-sandbox-system
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    image:
      tag: v0.4.6
    controller:
      extensions: true

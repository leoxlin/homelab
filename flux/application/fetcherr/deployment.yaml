---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fetcherr
  labels:
    app: fetcherr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: fetcherr
  template:
    metadata:
      labels:
        app: fetcherr
    spec:
      containers:
        - name: gluetun
          # renovate: datasource=docker depName=qmcgaw/gluetun
          image: qmcgaw/gluetun:latest@sha256:0e999c910d8077458ffbd869acfd9faa2a49decbca02afec6370277854587b3e
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "mullvad"
            - name: VPN_TYPE
              value: "wireguard"
            - name: UPDATER_PERIOD
              value: "24h"
          envFrom:
            - secretRef:
                name: gluetun-secrets
          volumeMounts:
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            requests:
              memory: 128Mi
        - name: nzbget
          # renovate: datasource=docker depName=lscr.io/linuxserver/nzbget
          image: lscr.io/linuxserver/nzbget:v26.1-ls248@sha256:9fd97d831a5cfc9749afbdb6b5f5623128eb06f42dbe91053478fd14f00e42b0
          env:
            - name: PUID
              value: "1121"
            - name: PGID
              value: "1121"
            - name: TZ
              value: "America/New_York"
            - name: NZBGET_USER
              value: ""
            - name: NZBGET_PASS
              value: ""
          ports:
            - containerPort: 6789
          volumeMounts:
            - name: nzbget-config
              mountPath: /config
            - name: nzbget-config
              mountPath: /staging
              subPath: staging
            - name: media
              mountPath: /downloads
              subPath: Downloads
          resources:
            requests:
              memory: 256Mi
        - name: qbittorrent
          # renovate: datasource=docker depName=lscr.io/linuxserver/qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.2.1_v2.0.13-ls461@sha256:1fc3067c4e684a4139be2e17915a63e9355ccba91c954a330d33fcb033bf7e71
          env:
            - name: PUID
              value: "1121"
            - name: PGID
              value: "1121"
            - name: TZ
              value: "America/New_York"
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "6887"
          ports:
            - containerPort: 8080
            - containerPort: 6887
              protocol: TCP
            - containerPort: 6887
              protocol: UDP
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: qbittorrent-config
              mountPath: /staging
              subPath: staging
            - name: media
              mountPath: /downloads
              subPath: Downloads
          resources:
            requests:
              memory: 256Mi
      volumes:
        - name: nzbget-config
          hostPath:
            path: /share/docker/nzbget
            type: DirectoryOrCreate
        - name: qbittorrent-config
          hostPath:
            path: /share/docker/qbittorrent
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: /srv/mergerfs/union_01/media
            type: DirectoryOrCreate
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
      nodeSelector:
        kubernetes.io/hostname: marten

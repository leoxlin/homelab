---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fetcherr
  labels:
    app: fetcherr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: fetcherr
  template:
    metadata:
      labels:
        app: fetcherr
    spec:
      containers:
        - name: gluetun
          image: qmcgaw/gluetun
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "private internet access"
            - name: SERVER_REGIONS
              value: "US Massachusetts"
          envFrom:
            - secretRef:
                name: gluetun-secrets
          volumeMounts:
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            requests:
              memory: 128Mi
        - name: nzbget
          image: lscr.io/linuxserver/nzbget:latest
          env:
            - name: PUID
              value: "1121"
            - name: PGID
              value: "1121"
            - name: TZ
              value: "America/New_York"
            - name: NZBGET_USER
              value: ""
            - name: NZBGET_PASS
              value: ""
          ports:
            - containerPort: 6789
          volumeMounts:
            - name: nzbget-config
              mountPath: /config
            - name: nzbget-config
              mountPath: /staging
              subPath: staging
            - name: media
              mountPath: /downloads
              subPath: Downloads
          resources:
            requests:
              memory: 256Mi
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          env:
            - name: PUID
              value: "1121"
            - name: PGID
              value: "1121"
            - name: TZ
              value: "America/New_York"
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "6887"
          ports:
            - containerPort: 8080
            - containerPort: 6887
              protocol: TCP
            - containerPort: 6887
              protocol: UDP
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: qbittorrent-config
              mountPath: /staging
              subPath: staging
            - name: media
              mountPath: /downloads
              subPath: Downloads
          resources:
            requests:
              memory: 256Mi
      volumes:
        - name: nzbget-config
          hostPath:
            path: /share/docker/nzbget
            type: DirectoryOrCreate
        - name: qbittorrent-config
          hostPath:
            path: /share/docker/qbittorrent
            type: DirectoryOrCreate
        - name: media
          persistentVolumeClaim:
            claimName: marten-union-01-media
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
      nodeSelector:
        kubernetes.io/hostname: marten

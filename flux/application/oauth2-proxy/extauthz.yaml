---
# EnvoyFilter to add ext_authz to the public gateway
# This makes OAuth2-Proxy validate all requests through the public ingress
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: oauth2-proxy-extauthz
  namespace: istio-public-ingress
spec:
  workloadSelector:
    labels:
      istio: public-ingress
  configPatches:
    # Define the ext_authz cluster
    - applyTo: CLUSTER
      match:
        context: GATEWAY
      patch:
        operation: ADD
        value:
          name: oauth2-proxy-extauthz
          type: STRICT_DNS
          connect_timeout: 10s
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: oauth2-proxy-extauthz
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: oauth2-proxy.default.svc.cluster.local
                          port_value: 4180

    # Add the ext_authz HTTP filter
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.ext_authz
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
            transport_api_version: V3
            http_service:
              server_uri:
                uri: http://oauth2-proxy.default.svc.cluster.local:4180
                cluster: oauth2-proxy-extauthz
                timeout: 10s
              # OAuth2-Proxy auth endpoint
              path_prefix: /oauth2/auth
              authorization_request:
                allowed_headers:
                  patterns:
                    - exact: cookie
                    - exact: authorization
                    - prefix: x-forwarded-
                    - exact: x-real-ip
                headers_to_add:
                  # Pass the original host to OAuth2-Proxy
                  - key: X-Auth-Request-Redirect
                    value: "%REQ(:SCHEME)%://%REQ(:AUTHORITY)%%REQ(:PATH)%"
              authorization_response:
                # Headers to pass to upstream services after successful auth
                allowed_upstream_headers:
                  patterns:
                    - exact: authorization
                    - exact: x-auth-request-user
                    - exact: x-auth-request-email
                    - exact: x-auth-request-access-token
                    - prefix: x-auth-request-
                # Headers to pass back to client (for setting cookies)
                allowed_client_headers:
                  patterns:
                    - exact: set-cookie
                    - exact: location
                allowed_client_headers_on_success:
                  patterns:
                    - exact: set-cookie
            # Don't allow requests if auth service is down
            failure_mode_allow: false
            # Status on denied (will redirect to login)
            status_on_error:
              code: 403

---
# AuthorizationPolicy to bypass auth for OAuth2-Proxy's own endpoints
# Without this, the auth callback would be blocked by ext_authz
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: oauth2-proxy-bypass
  namespace: istio-public-ingress
spec:
  selector:
    matchLabels:
      istio: public-ingress
  action: ALLOW
  rules:
    # Allow OAuth2-Proxy endpoints without auth
    - to:
        - operation:
            hosts:
              - "oauth.hydrahmlb.cc"
    # Allow Authentik endpoints without auth (for OIDC flow)
    - to:
        - operation:
            hosts:
              - "authentik.hydrahmlb.cc"

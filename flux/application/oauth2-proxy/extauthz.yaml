---
# EnvoyFilter to add ext_authz to the public gateway
# This makes OAuth2-Proxy validate all requests through the public ingress
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: oauth2-proxy-extauthz
  namespace: istio-public-ingress
spec:
  workloadSelector:
    labels:
      istio: public-ingress
  configPatches:
    # Add the ext_authz HTTP filter
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.ext_authz
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
            transport_api_version: V3
            http_service:
              server_uri:
                uri: http://oauth2-proxy.default.svc.cluster.local:4180
                # Use Istio's auto-generated cluster
                cluster: outbound|4180||oauth2-proxy.default.svc.cluster.local
                timeout: 5s
              path_prefix: /oauth2/auth
              authorization_request:
                allowed_headers:
                  patterns:
                    - exact: cookie
                    - exact: authorization
                    - prefix: x-forwarded-
                    - exact: x-real-ip
                headers_to_add:
                  - key: X-Auth-Request-Redirect
                    value: "%REQ(:SCHEME)%://%REQ(:AUTHORITY)%%REQ(:PATH)%"
              authorization_response:
                allowed_upstream_headers:
                  patterns:
                    - exact: authorization
                    - prefix: x-auth-request-
                allowed_client_headers:
                  patterns:
                    - exact: set-cookie
                    - exact: location
                allowed_client_headers_on_success:
                  patterns:
                    - exact: set-cookie
            # Allow requests through if auth service is unavailable
            failure_mode_allow: true
            status_on_error:
              code: 403

---
# Disable ext_authz for Authentik (OIDC provider)
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: oauth2-proxy-bypass-authentik
  namespace: istio-public-ingress
spec:
  workloadSelector:
    labels:
      istio: public-ingress
  configPatches:
    - applyTo: HTTP_ROUTE
      match:
        context: GATEWAY
        routeConfiguration:
          vhost:
            name: "authentik.hydrahmlb.cc:443"
            route:
              action: ANY
      patch:
        operation: MERGE
        value:
          typed_per_filter_config:
            envoy.filters.http.ext_authz:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
              disabled: true

---
# Disable ext_authz for OAuth2-Proxy login/callback
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: oauth2-proxy-bypass-oauth
  namespace: istio-public-ingress
spec:
  workloadSelector:
    labels:
      istio: public-ingress
  configPatches:
    - applyTo: HTTP_ROUTE
      match:
        context: GATEWAY
        routeConfiguration:
          vhost:
            name: "oauth.hydrahmlb.cc:443"
            route:
              action: ANY
      patch:
        operation: MERGE
        value:
          typed_per_filter_config:
            envoy.filters.http.ext_authz:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
              disabled: true

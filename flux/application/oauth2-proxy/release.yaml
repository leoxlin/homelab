---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: flux-system
spec:
  releaseName: oauth2-proxy
  interval: 30m
  chart:
    spec:
      chart: oauth2-proxy
      version: "10.1.0"
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  targetNamespace: default
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 2

    config:
      existingSecret: oauth2-proxy-secrets

    extraArgs:
      provider: oidc
      oidc-issuer-url: "https://authentik.hydrahmlb.cc/application/o/oauth2-proxy/"
      skip-oidc-discovery: "true"
      login-url: "https://authentik.hydrahmlb.cc/application/o/authorize/"
      redeem-url: "https://authentik.hydrahmlb.cc/application/o/token/"
      oidc-jwks-url: "https://authentik.hydrahmlb.cc/application/o/oauth2-proxy/jwks/"
      profile-url: "https://authentik.hydrahmlb.cc/application/o/userinfo/"
      email-domain: "*"

      whitelist-domain: ".hydrahmlb.cc"
      cookie-domain: ".hydrahmlb.cc"
      cookie-secure: "true"
      cookie-samesite: "lax"
      cookie-expire: "168h"
      cookie-refresh: "1h"

      set-xauthrequest: "true"
      set-authorization-header: "true"
      pass-access-token: "true"
      pass-authorization-header: "true"
      pass-user-headers: "true"

      reverse-proxy: "true"
      skip-auth-route: "^/favicon.ico$"

    service:
      type: ClusterIP
      portNumber: 80

    resources:
      requests:
        memory: 64Mi

    podDisruptionBudget:
      enabled: true
      minAvailable: 1

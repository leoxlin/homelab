---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: woodpecker
  namespace: woodpecker
spec:
  hosts:
    - ci.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: woodpecker-server.woodpecker.svc.cluster.local
            port:
              number: 80

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: woodpecker
  namespace: flux-system
spec:
  releaseName: woodpecker
  interval: 30m
  chart:
    spec:
      chart: woodpecker
      version: "3.4.0"
      sourceRef:
        kind: HelmRepository
        name: woodpecker
        namespace: flux-system
  targetNamespace: woodpecker
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    server:
      enabled: true
      statefulSet:
        replicaCount: 1
      env:
        WOODPECKER_HOST: "https://ci.hydrahmlb.cc"
        WOODPECKER_OPEN: "true"
        WOODPECKER_FORGEJO: "true"
        WOODPECKER_FORGEJO_URL: "https://git.hydrahmlb.dev"
      extraSecretNamesForEnvFrom:
        - woodpecker-secrets
      createAgentSecret: false
      persistentVolume:
        enabled: true
        size: 10Gi
        storageClass: longhorn

    agent:
      enabled: true
      replicaCount: 2
      env:
        WOODPECKER_SERVER: "woodpecker-server:9000"
        WOODPECKER_BACKEND: kubernetes
        WOODPECKER_BACKEND_K8S_NAMESPACE: woodpecker
        WOODPECKER_BACKEND_K8S_STORAGE_CLASS: longhorn
        WOODPECKER_BACKEND_K8S_VOLUME_SIZE: 1G
        WOODPECKER_BACKEND_K8S_STORAGE_RWX: "true"
        WOODPECKER_CONNECT_RETRY_COUNT: "1"
        WOODPECKER_BACKEND_K8S_POD_AFFINITY: |
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node-role.kubernetes.io/worker
                      operator: In
                      values:
                        - "true"
      extraSecretNamesForEnvFrom:
        - woodpecker-secrets
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      persistence:
        enabled: true
        size: 1Gi
        storageClass: longhorn
      serviceAccount:
        create: true
        rbac:
          create: true

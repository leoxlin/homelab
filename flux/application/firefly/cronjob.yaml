---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: firefly-cron
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cron
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - "curl -sS http://firefly.default.svc.cluster.local:8080/api/v1/cron/${STATIC_CRON_TOKEN}"
              env:
                - name: STATIC_CRON_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: firefly-secrets
                      key: STATIC_CRON_TOKEN
          restartPolicy: OnFailure

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: langflow-ide
  namespace: flux-system
spec:
  releaseName: langflow-ide
  interval: 30m
  chart:
    spec:
      chart: langflow-ide
      version: "0.1.1"
      sourceRef:
        kind: HelmRepository
        name: langflow
        namespace: flux-system
  targetNamespace: default
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    langflow:
      global:
        image:
          tag: "1.7.3"
      backend:
        replicaCount: 1
        numWorkers: 1
        externalDatabase:
          enabled: true
          host:
            value: langflow-pg-rw.default.svc.cluster.local
          driver:
            value: postgresql
          user:
            value: app
          database:
            value: app
          port:
            value: "5432"
          password:
            valueFrom:
              secretKeyRef:
                name: langflow-pg-app
                key: password
        resources:
          requests:
            memory: 1Gi
        sqlite:
          enabled: false
        secretProvider:
          enabled: false
        postgresql:
          enabled: false
      frontend:
        enabled: true
        replicaCount: 1
        resources:
          requests:
            memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: brave
spec:
  selector:
    app: brave
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: brave
spec:
  hosts:
    - brave.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: brave.default.svc.cluster.local
            port:
              number: 3000

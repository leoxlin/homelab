---
apiVersion: v1
kind: Pod
metadata:
  name: openwebui-migration
  namespace: default
  labels:
    app: openwebui-migration
spec:
  containers:
    - name: migration
      image: alpine:latest
      command:
        - sleep
        - infinity
      volumeMounts:
        - name: openwebui-data
          mountPath: /data
      resources:
        requests:
          memory: 64Mi
  volumes:
    - name: openwebui-data
      persistentVolumeClaim:
        claimName: openwebui-data

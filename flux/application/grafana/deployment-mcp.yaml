---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-mcp
  namespace: monitoring
  labels:
    app: grafana-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-mcp
  template:
    metadata:
      labels:
        app: grafana-mcp
    spec:
      containers:
        - name: grafana-mcp
          # renovate: datasource=docker depName=grafana/mcp-grafana
          image: grafana/mcp-grafana:latest
          args:
            - "-t"
            - "streamable-http"
            - "--address"
            - "0.0.0.0:8000"
            - "--endpoint-path"
            - "/mcp"
          ports:
            - containerPort: 8000
              name: mcp
          env:
            - name: GRAFANA_URL
              value: "http://grafana.monitoring.svc.cluster.local:3000"
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: GRAFANA_SERVICE_ACCOUNT_TOKEN
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-mcp
  namespace: monitoring
spec:
  selector:
    app: grafana-mcp
  ports:
    - port: 8000
      targetPort: 8000
      name: mcp

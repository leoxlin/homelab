---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: vm-prom
        uid: vm-prom
        type: prometheus
        access: proxy
        url: http://vmselect-vmcluster.monitoring.svc:8481/select/0/prometheus
        isDefault: true
        editable: false

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  labels:
    app: immich
    component: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich
      component: server
  template:
    metadata:
      labels:
        app: immich
        component: server
    spec:
      containers:
        - name: server
          image: ghcr.io/immich-app/immich-server:v2.3.1
          ports:
            - containerPort: 2283
          env:
            - name: DB_HOSTNAME
              value: "immich-pg-rw.default.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              value: "app"
            - name: DB_DATABASE_NAME
              value: "app"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-pg-app
                  key: password
            - name: REDIS_HOSTNAME
              value: "immich-redis.default.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
          volumeMounts:
            - name: library
              mountPath: /data
              subPath: data
          resources:
            requests:
              memory: 512Mi
      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: marten-union-01-immich
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  labels:
    app: immich
    component: machine-learning
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich
      component: machine-learning
  template:
    metadata:
      labels:
        app: immich
        component: machine-learning
    spec:
      containers:
        - name: machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:v2.3.1
          ports:
            - containerPort: 3003
          env:
            - name: IMMICH_HOST
              value: "0.0.0.0"
            - name: IMMICH_PORT
              value: "3003"
          volumeMounts:
            - name: cache
              mountPath: /cache
          resources:
            requests:
              memory: 1Gi
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: immich-cache-data

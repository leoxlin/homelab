---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-code
  labels:
    app: cloud-code
    k8s.hydrahmlb.cc/schedule: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cloud-code
  template:
    metadata:
      labels:
        app: cloud-code
    spec:
      # Pin to non-arm nodes for now; the cloud-code image is amd64-only.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: NotIn
                    values:
                      - arm64
      # fsGroup makes the Longhorn PVC writable by the node user (uid/gid 1000)
      # baked into the cloud-code image.
      securityContext:
        fsGroup: 1000
      containers:
        # cloud-code listens only on localhost-of-pod (3001); all external traffic
        # arrives through the oauth2-proxy sidecar so Authentik SSO is mandatory.
        - name: cloud-code
          # renovate: datasource=docker depName=hydrahmlb/cloud-code
          image: hydrahmlb/cloud-code:latest@sha256:656d56d2a05cbabb140b2eaa40cc2853a861a885aa1e49f34f6987b23190070d
          ports:
            - containerPort: 3001
              name: app
          env:
            - name: HOME
              value: /data
          volumeMounts:
            - name: cloud-code-data
              mountPath: /data
          resources:
            requests:
              memory: 1Gi
      volumes:
        - name: cloud-code-data
          persistentVolumeClaim:
            claimName: cloud-code-data

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8up
  namespace: flux-system
spec:
  releaseName: k8up
  interval: 30m
  chart:
    spec:
      chart: k8up
      version: "4.8.6"
      sourceRef:
        kind: HelmRepository
        name: k8up-io
        namespace: flux-system
  targetNamespace: default
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    k8up:
      timezone: "America/New_York"
      skipWithoutAnnotation: true

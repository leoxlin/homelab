---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: happy-server
  labels:
    app: happy-server
    k8s.hydrahmlb.cc/schedule: server
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: happy-server
  template:
    metadata:
      labels:
        app: happy-server
    spec:
      containers:
        - name: happy-server
          image: hydrahmlb/happy-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
              name: http
          envFrom:
            - secretRef:
                name: happy-server-secrets
          env:
            - name: PORT
              value: "3005"
            - name: NODE_ENV
              value: production
            - name: PUBLIC_URL
              value: https://happy.hydrahmlb.cc
            - name: HANDY_MASTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: happy-server-secrets
                  key: HANDY_MASTER_SECRET
            - name: METRICS_ENABLED
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /data
          startupProbe:
            httpGet:
              path: /health
              port: 3005
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: happy-server-data
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: happy-server-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: happy-server

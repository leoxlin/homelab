---
apiVersion: v1
kind: Service
metadata:
  name: happy-server
spec:
  selector:
    app: happy-server
  ports:
    - name: http
      port: 3005
      targetPort: 3005
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: happy-server
spec:
  hosts:
    - happy.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
    - istio-public-ingress/hydrahmlb-public-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: happy-server.default.svc.cluster.local
            port:
              number: 3005

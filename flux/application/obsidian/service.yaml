---
apiVersion: v1
kind: Service
metadata:
  name: obsidian
spec:
  selector:
    app: obsidian
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: obsidian
spec:
  hosts:
    - obsidian.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: obsidian.default.svc.cluster.local
            port:
              number: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: obsidian
spec:
  selector:
    app: obsidian
  ports:
    - port: 3000
      targetPort: 3000
      name: http
    - port: 3100
      targetPort: 3100
      name: mcp
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: obsidian
spec:
  hosts:
    - obsidian.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - match:
        - uri:
            prefix: /mcp
      route:
        - destination:
            host: obsidian.default.svc.cluster.local
            port:
              number: 3100
    - route:
        - destination:
            host: obsidian.default.svc.cluster.local
            port:
              number: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian
  labels:
    app: obsidian
    k8s.hydrahmlb.cc/schedule: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: obsidian
  template:
    metadata:
      labels:
        app: obsidian
        k8s.hydrahmlb.cc/schedule: server
    spec:
      nodeSelector:
        node-role.kubernetes.io/server: "true"
      securityContext:
        fsGroup: 1000
      containers:
        - name: obsidian
          # renovate: datasource=docker depName=lscr.io/linuxserver/obsidian
          image: lscr.io/linuxserver/obsidian:v1.12.7-ls135
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          volumeMounts:
            - name: data
              mountPath: /config
              subPath: config
            - name: data
              mountPath: /data
              subPath: data
            - name: shm
              mountPath: /dev/shm
          resources:
            requests:
              memory: 1Gi
        - name: obsidian-mcp
          # renovate: datasource=docker depName=hydrahmlb/obsidian-mcp
          image: hydrahmlb/obsidian-mcp:latest
          env:
            - name: PORT
              value: "3100"
            - name: STREAMABLE_HTTP_PATH
              value: "/mcp"
            - name: OBSIDIAN_MCP_COMMAND
              value: "mcpvault /data/Obsidian"
          ports:
            - containerPort: 3100
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: obsidian-data
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep
  labels:
    app: karakeep
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: karakeep
  template:
    metadata:
      labels:
        app: karakeep
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: karakeep
          image: ghcr.io/karakeep-app/karakeep:release
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: karakeep-config
            - secretRef:
                name: karakeep-secrets
          volumeMounts:
            - name: karakeep-data
              mountPath: /data
          resources:
            requests:
              memory: 256Mi
        - name: meilisearch
          image: getmeili/meilisearch:v1.50.0
          ports:
            - containerPort: 7700
          envFrom:
            - configMapRef:
                name: karakeep-config
            - secretRef:
                name: karakeep-secrets
          volumeMounts:
            - name: karakeep-search-data
              mountPath: /meili_data
          resources:
            requests:
              memory: 128Mi
        - name: chrome
          image: gcr.io/zenika-hub/alpine-chrome:124
          ports:
            - containerPort: 9222
          args:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
          resources:
            requests:
              memory: 256Mi
        - name: karakeep-mcp
          # renovate: datasource=docker depName=hydrahmlb/karakeep-mcp
          image: hydrahmlb/karakeep-mcp:latest
          env:
            - name: PORT
              value: "3100"
            - name: STREAMABLE_HTTP_PATH
              value: "/mcp"
            - name: KARAKEEP_API_ADDR
              value: "http://localhost:3000"
            - name: KARAKEEP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep-secrets
                  key: KARAKEEP_API_KEY
          ports:
            - containerPort: 3100
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: karakeep-data
          persistentVolumeClaim:
            claimName: karakeep-data
        - name: karakeep-search-data
          persistentVolumeClaim:
            claimName: karakeep-search-data

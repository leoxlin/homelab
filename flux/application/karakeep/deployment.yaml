---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep
  labels:
    app: karakeep
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: karakeep
  template:
    metadata:
      labels:
        app: karakeep
    spec:
      containers:
        - name: karakeep
          image: ghcr.io/karakeep-app/karakeep:release@sha256:64d6a9bbf2d37b5c808cf06b5d87f1f1c7846fdd3844724145a9741aeb06fd31
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: karakeep-config
            - secretRef:
                name: karakeep-secrets
          volumeMounts:
            - name: karakeep-data
              mountPath: /data
          resources:
            requests:
              memory: 256Mi
        - name: meilisearch
          image: getmeili/meilisearch:v1.46.1@sha256:cbe0e500a5fc04397dfe0245cf143fee40658b26470daaf549f0a6927c5c08dc
          ports:
            - containerPort: 7700
          envFrom:
            - configMapRef:
                name: karakeep-config
            - secretRef:
                name: karakeep-secrets
          volumeMounts:
            - name: karakeep-search-data
              mountPath: /meili_data
          resources:
            requests:
              memory: 128Mi
        - name: chrome
          image: gcr.io/zenika-hub/alpine-chrome:124@sha256:1a0046448e0bb6c275c88f86e01faf0de62b02ec8572901256ada0a8c08be23f
          ports:
            - containerPort: 9222
          args:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
          resources:
            requests:
              memory: 256Mi
      volumes:
        - name: karakeep-data
          persistentVolumeClaim:
            claimName: karakeep-data
        - name: karakeep-search-data
          persistentVolumeClaim:
            claimName: karakeep-search-data

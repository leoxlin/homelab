---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: karakeep-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: karakeep-search-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 128Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: karakeep-migration-helper
  namespace: default
spec:
  containers:
    - name: helper
      image: alpine
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: karakeep-data
          mountPath: /data/karakeep
        - name: karakeep-search-data
          mountPath: /data/meilisearch
  volumes:
    - name: karakeep-data
      persistentVolumeClaim:
        claimName: karakeep-data
    - name: karakeep-search-data
      persistentVolumeClaim:
        claimName: karakeep-search-data

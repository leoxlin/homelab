---
apiVersion: v1
kind: Service
metadata:
  name: calibre-web
spec:
  selector:
    app: calibre-web
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: calibre-web
spec:
  hosts:
    - calibre.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: calibre-web.default.svc.cluster.local
            port:
              number: 8083

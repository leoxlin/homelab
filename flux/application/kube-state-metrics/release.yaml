---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-state-metrics
  namespace: flux-system
spec:
  releaseName: kube-state-metrics
  interval: 30m
  chart:
    spec:
      chart: kube-state-metrics
      version: "5.30.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  targetNamespace: monitoring
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    kubeRBACProxy:
      enabled: false
    resources:
      requests:
        cpu: 25m
        memory: 256Mi
      limits:
        memory: 512Mi

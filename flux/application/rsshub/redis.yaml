---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: rsshub-redis
spec:
  kubernetesConfig:
    image: redis:alpine3.22
    resources:
      requests:
        memory: 64Mi
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 128Mi

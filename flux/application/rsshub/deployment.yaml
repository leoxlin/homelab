---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsshub
  labels:
    app: rsshub
    k8s.hydrahmlb.cc/schedule: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rsshub
  template:
    metadata:
      labels:
        app: rsshub
    spec:
      containers:
        - name: rsshub
          image: ghcr.io/diygod/rsshub:2025-12-13
          ports:
            - containerPort: 1200
          env:
            - name: NODE_ENV
              value: production
            - name: CACHE_TYPE
              value: redis
            - name: REDIS_URL
              value: "redis://rsshub-redis.default.svc.cluster.local:6379/"
            - name: PUPPETEER_WS_ENDPOINT
              value: "ws://localhost:3001"
            - name: PUPPETEER_REAL_BROWSER_SERVICE
              value: "http://localhost:3000"
            - name: ALLOW_USER_HOTLINK_TEMPLATE
              value: "true"
            - name: HOTLINK_TEMPLATE
              value: "https://images.weserv.nl?url=$${href_ue}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 1200
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 1200
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 512Mi
        - name: browserless
          image: browserless/chrome:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          livenessProbe:
            httpGet:
              path: /pressure
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /pressure
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 128Mi
        - name: puppeteer
          image: ghcr.io/hyoban/puppeteer-real-browser-hono:sha-6c6cbbc
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 128Mi

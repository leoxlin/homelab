---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app: litellm
    k8s.hydrahmlb.cc/schedule: server
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: litellm
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm-database:main-stable
          args:
            - "--config"
            - "/app/config.yaml"
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - secretRef:
                name: litellm-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-pg-app
                  key: uri
            - name: PROXY_BASE_URL
              value: https://litellm.hydrahmlb.cc
            - name: GENERIC_AUTHORIZATION_ENDPOINT
              value: https://authentik.hydrahmlb.cc/application/o/authorize/
            - name: GENERIC_TOKEN_ENDPOINT
              value: https://authentik.hydrahmlb.cc/application/o/token/
            - name: GENERIC_USERINFO_ENDPOINT
              value: https://authentik.hydrahmlb.cc/application/o/userinfo/
            - name: GENERIC_SCOPE
              value: openid profile email
            - name: GENERIC_USER_ID_ATTRIBUTE
              value: sub
            - name: GENERIC_USER_EMAIL_ATTRIBUTE
              value: email
            - name: GENERIC_USER_DISPLAY_NAME_ATTRIBUTE
              value: name
            - name: AUTO_REDIRECT_UI_LOGIN_TO_SSO
              value: "true"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: config-volume
          configMap:
            name: litellm-config
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: litellm
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: litellm

---
model_list:
  - model_name: kimi-k2.7-code
    litellm_params:
      model: anthropic/kimi-k2.7-code
      api_base: https://api.kimi.com/coding/
      api_key: os.environ/KIMI_CODE_API_KEY
      extra_headers:
        User-Agent: claude-code/0.1.0
  - model_name: kimi-k2.6
    litellm_params:
      model: anthropic/kimi-k2.6
      api_base: https://api.kimi.com/coding/
      api_key: os.environ/KIMI_CODE_API_KEY
      extra_headers:
        User-Agent: claude-code/0.1.0
  - model_name: gpt-5.3-codex
    litellm_params:
      model: chatgpt/gpt-5.3-codex
      mode: responses
  - model_name: gpt-5.5
    litellm_params:
      model: chatgpt/gpt-5.5
      mode: responses
  - model_name: gpt-5.6
    litellm_params:
      model: chatgpt/gpt-5.6
      mode: responses
  - model_name: gpt-5.6-terra
    litellm_params:
      model: chatgpt/gpt-5.6-terra
      mode: responses
  - model_name: gpt-5.6-sol
    litellm_params:
      model: chatgpt/gpt-5.6-sol
      mode: responses
  - model_name: gpt-5.6-luna
    litellm_params:
      model: chatgpt/gpt-5.6-luna
      mode: responses
  - model_name: claude-opus-4-8
    litellm_params:
      model: openrouter/anthropic/claude-opus-4-8
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4-6
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: claude-haiku-4-5
    litellm_params:
      model: openrouter/anthropic/claude-haiku-4-5
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: gpt-4o
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: os.environ/OPENROUTER_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

mcp_servers:
  context7:
    url: "https://mcp.context7.com/mcp"
    static_headers:
      CONTEXT7_API_KEY: os.environ/CONTEXT7_API_KEY
    description: "Context7 documentation MCP"
  kagi:
    url: "https://mcp.kagi.com/mcp"
    auth_type: "bearer_token"
    auth_value: os.environ/KAGI_API_KEY
    description: "Kagi search and content extraction MCP"
  ticktick:
    url: "https://mcp.ticktick.com"
    auth_type: "bearer_token"
    auth_value: os.environ/TICKTICK_MCP_TOKEN
    description: "TickTick task manager MCP"
  karakeep:
    url: "http://karakeep.default.svc.cluster.local:3100/mcp"
    description: "Karakeep bookmarks MCP"
  fastmail:
    url: "https://api.fastmail.com/mcp"
    auth_type: "bearer_token"
    auth_value: os.environ/FASTMAIL_API_TOKEN
    description: "Fastmail email, calendar, and contacts MCP"
    disallowed_tools:
      # Block dangerous skills
      - send_email
      - delete_email
      - delete_contact
      - delete_event
      # Notes skills are unused
      - add_to_note
      - create_note
      - delete_note
      - read_note
      - search_notes
      - update_note
  grafana:
    url: "http://grafana-mcp.monitoring.svc.cluster.local:8000/mcp"
    transport: "http"
    description: "Grafana MCP"

litellm_settings:
  drop_params: true

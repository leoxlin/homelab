apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: lifecamp-pg
spec:
  instances: 1
  imageCatalogRef:
    kind: ClusterImageCatalog
    name: postgresql-minimal-trixie
    major: 17
  bootstrap:
    initdb:
      database: app
      owner: app
  storage:
    storageClass: longhorn
    size: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr-server
  labels:
    app: tdarr
    component: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tdarr
      component: server
  template:
    metadata:
      labels:
        app: tdarr
        component: server
    spec:
      securityContext:
        fsGroup: 1121
      containers:
        - name: tdarr-server
          # renovate: datasource=docker depName=ghcr.io/haveagitgat/tdarr
          image: ghcr.io/haveagitgat/tdarr:latest@sha256:e5163f305367b47baacee761aa98f420fb4e46a8e5db22b197f23a550f96dd6b
          ports:
            - containerPort: 8265
            - containerPort: 8266
          env:
            - name: PUID
              value: "1121"
            - name: PGID
              value: "1121"
            - name: TZ
              value: "America/New_York"
            - name: serverIP
              value: "0.0.0.0"
            - name: serverPort
              value: "8266"
            - name: webUIPort
              value: "8265"
            - name: internalNode
              value: "false"
          volumeMounts:
            - name: server-config
              mountPath: /app/server
            - name: media
              mountPath: /media
            - name: temp
              mountPath: /temp
          resources:
            requests:
              memory: 512Mi
      volumes:
        - name: server-config
          persistentVolumeClaim:
            claimName: tdarr-server-config
        - name: media
          hostPath:
            path: /srv/mergerfs/union_01/media
            type: DirectoryOrCreate
        - name: temp
          hostPath:
            path: /share/docker/tdarr/transcode
            type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/hostname: marten
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr-node
  labels:
    app: tdarr
    component: node
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tdarr
      component: node
  template:
    metadata:
      labels:
        app: tdarr
        component: node
    spec:
      securityContext:
        fsGroup: 1121
        supplementalGroups:
          - 44 # video
          - 989 # render
      containers:
        - name: tdarr-node
          # renovate: datasource=docker depName=ghcr.io/haveagitgat/tdarr_node
          image: ghcr.io/haveagitgat/tdarr_node:latest@sha256:1ec96caf6735d3c1bae5e71540cfb686bfa3ad960eff5a2a526cc68e53551779
          securityContext:
            privileged: true
          env:
            - name: PUID
              value: "1121"
            - name: PGID
              value: "1121"
            - name: TZ
              value: "America/New_York"
            - name: LIBVA_DRIVER_NAME
              value: "iHD"
            - name: serverIP
              value: "tdarr-server"
            - name: serverPort
              value: "8266"
            - name: internalNode
              value: "false"
            - name: nodeID
              value: "node-marten-01"
          volumeMounts:
            - name: media
              mountPath: /media
            - name: dri
              mountPath: /dev/dri
            - name: temp
              mountPath: /temp
          resources:
            requests:
              memory: 1Gi
      volumes:
        - name: media
          hostPath:
            path: /srv/mergerfs/union_01/media
            type: DirectoryOrCreate
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: temp
          hostPath:
            path: /share/docker/tdarr/transcode
            type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/hostname: marten

---
apiVersion: v1
kind: Service
metadata:
  name: tdarr-server
spec:
  selector:
    app: tdarr
    component: server
  ports:
    - port: 8265
      targetPort: 8265
      name: http
    - port: 8266
      targetPort: 8266
      name: internal
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: tdarr
spec:
  hosts:
    - tdarr.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: tdarr-server.default.svc.cluster.local
            port:
              number: 8265

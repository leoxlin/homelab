---
apiVersion: v1
kind: Service
metadata:
  name: paperless
spec:
  selector:
    app: paperless
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: paperless
spec:
  hosts:
    - paper.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: paperless.default.svc.cluster.local
            port:
              number: 8000

---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: tubearchivist-redis
spec:
  podSecurityContext:
    fsGroup: 999
    runAsUser: 999
  kubernetesConfig:
    image: redis:8.8-alpine
    resources:
      requests:
        memory: 64Mi
  nodeSelector:
    kubernetes.io/hostname: marten
  tolerations:
    - key: node-role.kubernetes.io/storage
      operator: Equal
      value: "true"
      effect: NoSchedule
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 128Mi

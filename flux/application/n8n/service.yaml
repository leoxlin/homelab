---
apiVersion: v1
kind: Service
metadata:
  name: n8n
spec:
  selector:
    app: n8n
    component: main
  ports:
    - port: 5678
      targetPort: 5678
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: n8n
spec:
  hosts:
    - n8n.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: n8n.default.svc.cluster.local
            port:
              number: 5678

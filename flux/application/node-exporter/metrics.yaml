---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: node-exporter
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-exporter
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: node-exporter
      path: /metrics
      interval: 15s
      relabelConfigs:
        - sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: instance_hostname

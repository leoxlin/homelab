---
apiVersion: v1
kind: Service
metadata:
  name: hermes
spec:
  selector:
    app: hermes
  ports:
    - port: 8642
      targetPort: 8642
      name: api
    - port: 9119
      targetPort: 9119
      name: dashboard
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: hermes
spec:
  hosts:
    - hermes.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: hermes.default.svc.cluster.local
            port:
              number: 9119

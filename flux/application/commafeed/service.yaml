---
apiVersion: v1
kind: Service
metadata:
  name: commafeed
spec:
  selector:
    app: commafeed
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: commafeed
spec:
  hosts:
    - rss.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
    - istio-public-ingress/hydrahmlb-public-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: commafeed.default.svc.cluster.local
            port:
              number: 8082

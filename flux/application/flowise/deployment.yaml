---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowise
  labels:
    app: flowise
    k8s.hydrahmlb.cc/schedule: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: flowise
  template:
    metadata:
      labels:
        app: flowise
    spec:
      containers:
        - name: flowise
          image: flowiseai/flowise:3.0.12
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_TYPE
              value: postgres
            - name: DATABASE_HOST
              value: flowise-pg-rw.default.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: app
            - name: DATABASE_NAME
              value: app
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowise-pg-app
                  key: password
          envFrom:
            - secretRef:
                name: flowise-secrets
          volumeMounts:
            - name: flowise-data
              mountPath: /root/.flowise/storage
          resources:
            requests:
              memory: 512Mi
      volumes:
        - name: flowise-data
          persistentVolumeClaim:
            claimName: flowise-data

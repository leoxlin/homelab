---
# Migration deployment - use this to copy config from your existing setup
# Once migration is complete, replace this with the actual nextcloud deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-migration
  labels:
    app: nextcloud-migration
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nextcloud-migration
  template:
    metadata:
      labels:
        app: nextcloud-migration
    spec:
      securityContext:
        fsGroup: 1120
      containers:
        - name: migration
          image: alpine:latest
          command: ["sleep", "infinity"]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 128Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: nextcloud-config
        - name: data
          persistentVolumeClaim:
            claimName: marten-union-01-nextcloud
      nodeSelector:
        kubernetes.io/hostname: marten

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: flux-system
spec:
  releaseName: authentik
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: "2025.12.1"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  targetNamespace: default
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      env:
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-pg-app
              key: password
      volumes:
        - name: authentik-data
          persistentVolumeClaim:
            claimName: authentik-data
      volumeMounts:
        - name: authentik-data
          mountPath: /media
          subPath: media
        - name: authentik-data
          mountPath: /templates
          subPath: templates
        - name: authentik-data
          mountPath: /certs
          subPath: certs
    authentik:
      secret_key:
        existingSecret: authentik-secrets
        secretKey: AUTHENTIK_SECRET_KEY
      postgresql:
        host: authentik-pg-rw.default.svc.cluster.local
        port: 5432
        name: app
        user: app
      redis:
        host: authentik-redis.default.svc.cluster.local
        port: 6379

    server:
      replicas: 1
      service:
        type: ClusterIP
      ingress:
        enabled: false
      resources:
        requests:
          memory: 512Mi

    worker:
      replicas: 1
      resources:
        requests:
          memory: 512Mi

    postgresql:
      enabled: false
    redis:
      enabled: false

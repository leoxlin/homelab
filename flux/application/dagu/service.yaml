---
apiVersion: v1
kind: Service
metadata:
  name: dagu
spec:
  selector:
    app: dagu
  ports:
    - port: 8080
      targetPort: http
      name: http
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: dagu
spec:
  hosts:
    - dagu.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: dagu.default.svc.cluster.local
            port:
              number: 8080

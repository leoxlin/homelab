---
apiVersion: v1
kind: ConfigMap
metadata:
  name: roundcube-config
data:
  ROUNDCUBEMAIL_DEFAULT_HOST: "ssl://imap.fastmail.com"
  ROUNDCUBEMAIL_DEFAULT_PORT: "993"
  ROUNDCUBEMAIL_SMTP_SERVER: "tls://smtp.fastmail.com"
  ROUNDCUBEMAIL_SMTP_PORT: "587"
  ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE: "25M"
  ROUNDCUBEMAIL_PLUGINS: "archive,zipdownload,managesieve"
  ROUNDCUBEMAIL_SKIN: "elastic"
  ROUNDCUBEMAIL_DB_TYPE: "pgsql"
  ROUNDCUBEMAIL_DB_HOST: "roundcube-pg-rw.default.svc.cluster.local"
  ROUNDCUBEMAIL_DB_PORT: "5432"
  ROUNDCUBEMAIL_DB_USER: "app"
  ROUNDCUBEMAIL_DB_NAME: "app"

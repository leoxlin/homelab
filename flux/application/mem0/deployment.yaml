---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mem0
  labels:
    app: mem0
    k8s.hydrahmlb.cc/schedule: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mem0
  template:
    metadata:
      labels:
        app: mem0
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          # renovate: datasource=docker depName=hydrahmlb/mem0
          image: hydrahmlb/mem0:latest
          args: ["server"]
          ports:
            - containerPort: 8000
              name: api
          envFrom:
            - configMapRef:
                name: mem0-config
            - secretRef:
                name: mem0-secrets
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mem0-pg-app
                  key: password
          volumeMounts:
            - name: history
              mountPath: /app/history
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          startupProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 30
        - name: dashboard
          # renovate: datasource=docker depName=hydrahmlb/mem0
          image: hydrahmlb/mem0:latest
          args: ["dashboard"]
          ports:
            - containerPort: 3000
              name: dashboard
          envFrom:
            - configMapRef:
                name: mem0-config
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: history
          persistentVolumeClaim:
            claimName: mem0-history

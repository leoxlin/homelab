---
apiVersion: v1
kind: Service
metadata:
  name: librechat-admin-panel
  namespace: librechat
spec:
  selector:
    app: librechat-admin-panel
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: librechat-admin-panel
  namespace: librechat
spec:
  hosts:
    - librechat-admin.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: librechat-admin-panel.librechat.svc.cluster.local
            port:
              number: 3000

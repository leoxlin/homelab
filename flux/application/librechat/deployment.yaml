---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: librechat
  labels:
    app: librechat
    k8s.hydrahmlb.cc/schedule: worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: librechat
  template:
    metadata:
      labels:
        app: librechat
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: librechat
          # renovate: datasource=docker depName=registry.librechat.ai/danny-avila/librechat
          image: registry.librechat.ai/danny-avila/librechat:v0.8.7
          ports:
            - containerPort: 3080
          envFrom:
            - configMapRef:
                name: librechat-config
            - secretRef:
                name: librechat-secrets
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: librechat-mongo-librechat-app
                  key: connectionString.standard
          volumeMounts:
            - name: librechat-data
              mountPath: /app/client/public/images
              subPath: images
            - name: librechat-data
              mountPath: /app/uploads
              subPath: uploads
            - name: librechat-data
              mountPath: /app/logs
              subPath: logs
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3080
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: meilisearch
          image: getmeili/meilisearch:v1.14.3
          ports:
            - containerPort: 7700
          envFrom:
            - configMapRef:
                name: librechat-config
            - secretRef:
                name: librechat-secrets
          volumeMounts:
            - name: librechat-search-data
              mountPath: /meili_data
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: librechat-data
          persistentVolumeClaim:
            claimName: librechat-data
        - name: librechat-search-data
          persistentVolumeClaim:
            claimName: librechat-search-data

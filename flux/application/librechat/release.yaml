---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librechat
  namespace: flux-system
spec:
  releaseName: librechat
  targetNamespace: librechat
  interval: 30m
  chart:
    spec:
      chart: librechat
      version: "2.0.7"
      sourceRef:
        kind: HelmRepository
        name: librechat
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: librechat

    # renovate: datasource=docker depName=registry.librechat.ai/danny-avila/librechat
    image:
      registry: registry.librechat.ai
      repository: danny-avila/librechat
      tag: v0.8.7

    ingress:
      enabled: false

    nodeSelector:
      kubernetes.io/arch: amd64

    updateStrategy:
      type: Recreate

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi

    global:
      librechat:
        existingSecretName: librechat-secrets
        # The existing 1Password secret may contain stale endpoint values from
        # the previous raw-manifest stack. Force the chart-generated endpoints
        # so pods talk to the bundled subcharts instead of the pruned services.
        env:
          - name: MONGO_URI
            value: mongodb://librechat-mongodb.librechat.svc.cluster.local:27017/LibreChat
          - name: MEILI_HOST
            value: http://librechat-meilisearch.librechat.svc.cluster.local:7700
          - name: REDIS_URI
            value: redis://librechat-redis-master.librechat.svc.cluster.local:6379

    librechat:
      existingSecretName: librechat-secrets
      adminPanelUrl: "https://librechat-admin.hydrahmlb.cc"
      configEnv:
        HOST: "0.0.0.0"
        PORT: "3080"
        SERVER_DOMAIN: "librechat.hydrahmlb.cc"
        DOMAIN_CLIENT: "https://librechat.hydrahmlb.cc"
        DOMAIN_SERVER: "https://librechat.hydrahmlb.cc"
        NODE_ENV: "production"
        USE_REDIS: "true"
        MEILI_NO_ANALYTICS: "true"
        ALLOW_REGISTRATION: "false"
        ALLOW_SHARED_LINKS_PUBLIC: "false"
        # OIDC via Authentik (secrets live in the 1Password-backed librechat-secrets secret)
        ALLOW_SOCIAL_LOGIN: "true"
        ALLOW_SOCIAL_REGISTRATION: "false"
        OPENID_ISSUER: "https://authentik.hydrahmlb.cc/application/o/librechat/"
        OPENID_CALLBACK_URL: "/oauth/openid/callback"
        OPENID_SCOPE: "openid profile email"
        OPENID_BUTTON_LABEL: "Sign in with Authentik"
        OPENID_USE_PKCE: "true"
        OPENID_USERNAME_CLAIM: "preferred_username"
        OPENID_NAME_CLAIM: "name"
        OPENID_EMAIL_CLAIM: "email"
        # OIDC admin elevation via existing Authentik group
        OPENID_ADMIN_ROLE: "authentik Admins"
        OPENID_ADMIN_ROLE_PARAMETER_PATH: "groups"
        OPENID_ADMIN_ROLE_TOKEN_KIND: "userinfo"
      imageVolume:
        enabled: true
        size: 5Gi
        accessModes: ReadWriteOnce
        storageClassName: longhorn

    mongodb:
      enabled: true
      auth:
        enabled: false
      persistence:
        enabled: true
        storageClass: longhorn
        size: 5Gi

    meilisearch:
      enabled: true
      # renovate: datasource=docker depName=getmeili/meilisearch
      image:
        tag: v1.35.1
      persistence:
        enabled: true
        storageClass: longhorn
        size: 1Gi
      auth:
        existingMasterKeySecret: librechat-secrets
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi

    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
      master:
        persistence:
          enabled: true
          storageClass: longhorn
          size: 512Mi

---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: librechat
  namespace: librechat
spec:
  hosts:
    - librechat.hydrahmlb.cc
  gateways:
    - istio-ingress/hydrahmlb-gateway
  http:
    - match:
        - port: 80
      redirect:
        scheme: https
        redirectCode: 301
    - route:
        - destination:
            host: librechat.librechat.svc.cluster.local
            port:
              number: 3080

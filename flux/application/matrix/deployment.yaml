---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: matrix
  labels:
    app: matrix
spec:
  replicas: 1
  serviceName: matrix
  selector:
    matchLabels:
      app: matrix
  template:
    metadata:
      labels:
        app: matrix
    spec:
      # continuwuity image is amd64-only; keep off arm nodes.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: NotIn
                    values:
                      - arm64
      securityContext:
        sysctls:
          - name: net.ipv4.ip_unprivileged_port_start
            value: "0"
      containers:
        - name: continuwuity
          # renovate: datasource=docker depName=forgejo.ellis.link/continuwuation/continuwuity
          image: forgejo.ellis.link/continuwuation/continuwuity:v0.5.9
          command: ["/sbin/conduwuit"]
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - mountPath: /data
              name: data
              subPath: data
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
          env:
            - name: TOKIO_WORKER_THREADS
              value: "2"
            - name: CONTINUWUITY_SERVER_NAME
              value: "matrix.hydrahmlb.cc"
            - name: CONTINUWUITY_DATABASE_PATH
              value: "/data/db"
            - name: CONTINUWUITY_DATABASE_BACKEND
              value: "rocksdb"
            - name: CONTINUWUITY_PORT
              value: "80"
            - name: CONTINUWUITY_ADDRESS
              value: "0.0.0.0"
            - name: CONTINUWUITY_MAX_REQUEST_SIZE
              value: "20000000"
            - name: CONTINUWUITY_ALLOW_FEDERATION
              value: "false"
            - name: CONTINUWUITY_ALLOW_REGISTRATION
              value: "false"
            - name: CONTINUWUITY_ROCKSDB_PARALLELISM_THREADS
              value: "1"
            - name: CONTINUWUITY_WELL_KNOWN__CLIENT
              value: "https://matrix.hydrahmlb.cc"
            - name: RUST_LOG
              value: info
          readinessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: http
            periodSeconds: 4
            failureThreshold: 5
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: matrix-data

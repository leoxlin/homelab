---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: flux-system
spec:
  releaseName: kagent-crds
  interval: 30m
  chart:
    spec:
      chart: kagent-crds
      version: "0.9.7"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
  targetNamespace: kagent
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: flux-system
spec:
  releaseName: kagent
  interval: 30m
  chart:
    spec:
      chart: kagent
      version: "0.9.7"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
  targetNamespace: kagent
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: kagent-crds
      namespace: flux-system
  values:
    providers:
      default: openAI
      openAI:
        provider: OpenAI
        model: "anthropic/claude-sonnet-4"
        apiKeySecretRef: kagent-secrets
        apiKeySecretKey: OPENAI_API_KEY
        config:
          baseUrl: "https://openrouter.ai/api/v1"
    observability-agent:
      enabled: true
    promql-agent:
      enabled: true
    k8s-agent:
      enabled: true
    kgateway-agent:
      enabled: false
    istio-agent:
      enabled: false
    argo-rollouts-agent:
      enabled: false
    helm-agent:
      enabled: false
    cilium-policy-agent:
      enabled: false
    cilium-manager-agent:
      enabled: false
    cilium-debug-agent:
      enabled: false
    grafana-mcp:
      enabled: true
      grafana:
        url: "http://grafana.monitoring.svc.cluster.local:3000"
        secretRef: kagent-secrets

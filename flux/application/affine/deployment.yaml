---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine
  labels:
    app: affine
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: affine
  template:
    metadata:
      labels:
        app: affine
    spec:
      initContainers:
        - name: migration
          image: ghcr.io/toeverything/affine:stable
          command: ["sh", "-c", "node ./scripts/self-host-predeploy.js"]
          envFrom:
            - configMapRef:
                name: affine-config
            - secretRef:
                name: affine-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: affine-pg-app
                  key: uri
          volumeMounts:
            - name: affine-storage
              mountPath: /root/.affine/storage
            - name: affine-config-vol
              mountPath: /root/.affine/config
      containers:
        - name: affine
          image: ghcr.io/toeverything/affine:stable
          ports:
            - containerPort: 3010
          envFrom:
            - configMapRef:
                name: affine-config
            - secretRef:
                name: affine-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: affine-pg-app
                  key: uri
          volumeMounts:
            - name: affine-storage
              mountPath: /root/.affine/storage
            - name: affine-config-vol
              mountPath: /root/.affine/config
          livenessProbe:
            httpGet:
              path: /
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 512Mi
      volumes:
        - name: affine-storage
          persistentVolumeClaim:
            claimName: affine-storage
        - name: affine-config-vol
          persistentVolumeClaim:
            claimName: affine-config

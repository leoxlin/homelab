---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmoperator-crds
  namespace: flux-system
spec:
  releaseName: vmoperator-crds
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-operator-crds
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: flux-system
  targetNamespace: monitoring
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

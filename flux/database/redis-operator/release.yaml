---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
  namespace: flux-system
spec:
  releaseName: redis-operator
  interval: 30m
  chart:
    spec:
      chart: redis-operator
      version: "0.23.0"
      sourceRef:
        kind: HelmRepository
        name: ot-container-kit
        namespace: flux-system
  targetNamespace: database-operators
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    crds:
      enabled: true

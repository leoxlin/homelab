---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mongodb-operator
  namespace: flux-system
spec:
  releaseName: mongodb-kubernetes-operator
  interval: 30m
  chart:
    spec:
      chart: mongodb-kubernetes
      version: "1.9.1"
      sourceRef:
        kind: HelmRepository
        name: mongodb
        namespace: flux-system
  targetNamespace: database-operators
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

name: Renovate

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      log_level:
        description: "Renovate log level"
        type: string
        default: info
      dry_run:
        description: "Dry run mode (full|lookup|extract|empty for off)"
        type: string
        default: ""

jobs:
  renovate:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/renovatebot/renovate:43@sha256:459b7e28aa54fa2fa7db83df6a2d6ad26de416a054ee554e7833203adf3d9a47
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Run Renovate
        run: renovate
        env:
          RENOVATE_PLATFORM: github
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_REPOSITORIES: leoxlin/homelab
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@hydrahmlb.cc>"
          RENOVATE_CONFIG_FILE: ${{ github.workspace }}/renovate.json
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dry_run }}

---
# User that owns and runs the agent services.
agents_user: agents
agents_user_uid: 1130
agents_group: agents
agents_group_gid: 1130
agents_home: "/home/{{ agents_user }}"

# Interactive desktop user that gets wrapper scripts / launchers.
agents_llin_user: llin
agents_llin_home: "/home/{{ agents_llin_user }}"
agents_llin_bin_dir: "{{ agents_llin_home }}/.local/bin"
agents_llin_apps_dir: "{{ agents_llin_home }}/.local/share/applications"

# When true, force an upgrade to the latest available version.
agents_upgrade: false

# Hermes installation settings.
agents_hermes_bin: "{{ agents_home }}/.local/bin/hermes"
agents_hermes_install_script_url: "https://hermes-agent.nousresearch.com/install.sh"
agents_hermes_install_script_flags: "--non-interactive --skip-setup --skip-browser"

# Kimi Code installation settings.
agents_kimi_version: "" # empty = latest
agents_kimi_install_dir: "{{ agents_home }}/.kimi-code"
agents_kimi_bin: "{{ agents_home }}/.local/bin/kimi"

# Hermes data directory. The role creates it but does not manage ~/.hermes/.env.
agents_hermes_home: "{{ agents_home }}/.hermes"

# Hermes desktop build output path.
agents_hermes_desktop_dir: "{{ agents_hermes_home }}/hermes-agent/apps/desktop"
agents_hermes_desktop_sandbox: "{{ agents_hermes_desktop_dir }}/release/linux-unpacked/chrome-sandbox"
agents_hermes_desktop_icon_src: "{{ agents_hermes_desktop_dir }}/assets/icon.png"
agents_hermes_desktop_icon_dest: "{{ agents_llin_home }}/.local/share/hermes-desktop/icon.png"

# Signal CLI daemon settings.
agents_signal_cli_bin: /usr/bin/signal-cli
agents_signal_cli_data_dir: "{{ agents_home }}/.local/share/signal-cli/data"

---
- name: Start configure
  ansible.netcommon.cli_command:
    command: "configure"

- name: Configure BGP router ID
  ansible.netcommon.cli_command:
    command: "set protocols bgp {{ edgeos_bgp_asn }} parameters router-id {{ edgeos_bgp_router_id }}"

- name: Configure BGP neighbors
  ansible.netcommon.cli_command:
    command: "set protocols bgp {{ edgeos_bgp_asn }} neighbor {{ item }} remote-as {{ edgeos_bgp_peer_asn }}"
  loop: "{{ edgeos_bgp_neighbors }}"

- name: Reset DNS forwarding name-servers
  ansible.netcommon.cli_command:
    command: "delete service dns forwarding name-server"
  ignore_errors: true

- name: Configure DNS forwarding name-servers
  ansible.netcommon.cli_command:
    command: "set service dns forwarding name-server {{ item }}"
  loop: "{{ edgeos_dns_name_servers }}"

- name: Enforce strict upstream order
  ansible.netcommon.cli_command:
    command: "set service dns forwarding options strict-order"

- name: Configure DNS address overrides for internal domains
  ansible.netcommon.cli_command:
    command: "set service dns forwarding options address=/{{ item.domain }}/{{ item.address }}"
  loop: "{{ edgeos_dns_address_overrides }}"

- name: Advertise router as DHCP DNS server
  ansible.netcommon.cli_command:
    command: >-
      set service dhcp-server shared-network-name {{ item.shared_network_name }}
      subnet {{ item.subnet }} dns-server {{ item.dns_server }}
  loop: "{{ edgeos_dhcp_subnets }}"

- name: Configure static routes
  ansible.netcommon.cli_command:
    command: "set protocols static route {{ item.destination }} next-hop {{ item.next_hop }}"
  loop: "{{ edgeos_static_routes }}"

- name: Commit config
  ansible.netcommon.cli_command:
    command: "commit"

- name: Save config
  ansible.netcommon.cli_command:
    command: "save"

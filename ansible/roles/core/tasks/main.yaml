---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - '{{ ansible_facts["distribution"] | lower }}.yaml'
    - '{{ ansible_facts["os_family"] | lower }}.yaml'
    - "default.yaml"

- name: Include linux users tasks
  ansible.builtin.include_tasks: users.yaml

- name: Include SSH hardening tasks
  ansible.builtin.include_tasks: ssh.yaml

- name: Include firewall tasks
  ansible.builtin.include_tasks: firewall.yaml
  when: security_firewall_enabled | default(true)

- name: Include fail2ban tasks
  ansible.builtin.include_tasks: fail2ban.yaml
  when: security_fail2ban_enabled | default(true)

- name: Include sysctl hardening tasks
  ansible.builtin.include_tasks: sysctl.yaml
  when: security_sysctl_hardening | default(true)

- name: Include system packages tasks
  ansible.builtin.include_tasks: packages.yaml

- name: Include system hostname config tasks
  ansible.builtin.include_tasks: hostname.yaml

- name: Include system timezone tasks
  ansible.builtin.include_tasks: timezone.yaml

- name: Include automatic updates tasks
  ansible.builtin.include_tasks: auto_updates.yaml
  when:
    - system_auto_updates
    - ansible_os_family == "Debian"

---
name: pangolin-client

services:
  pangolin-client:
    image: fosrl/pangolin-cli:latest@sha256:339d041dbdd38f6ba048a99af9c17719c3a44e5eb438deb400c6deca55c0f5b1
    container_name: pangolin-client
    restart: unless-stopped
    network_mode: host

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

    env_file:
      - .env

    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun:/dev/net/tun

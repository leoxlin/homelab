---
name: pangolin-client

services:
  pangolin-client:
    image: fosrl/pangolin-cli:latest
    container_name: pangolin-client
    restart: unless-stopped
    network_mode: host

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

    env_file:
      - .env

    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun:/dev/net/tun

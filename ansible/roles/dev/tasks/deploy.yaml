---
- name: "Create directory for {{ stack.name }}"
  ansible.builtin.file:
    path: "{{ docker_compose_base_dir }}/{{ stack.name }}"
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: "Find .env template for {{ stack.name }}"
  ansible.builtin.stat:
    path: "{{ item }}"
  register: env_template_stat
  become: false
  delegate_to: localhost
  loop:
    - "{{ role_path }}/templates/{{ stack.name }}/{{ inventory_hostname }}/.env.tpl"
    - "{{ role_path }}/templates/{{ stack.name }}/.env.tpl"

- name: "Resolve .env template path for {{ stack.name }}"
  ansible.builtin.set_fact:
    env_tpl_path: "{{ (env_template_stat.results | selectattr('stat.exists') | first).item }}"
  when: env_template_stat.results | selectattr('stat.exists') | list | length > 0

- name: "Inject secrets into .env template for {{ stack.name }}"
  ansible.builtin.command:
    cmd: "op inject -i {{ env_tpl_path }}"
  register: env_content
  delegate_to: localhost
  become: false
  when: env_tpl_path is defined
  changed_when: false

- name: "Create .env file for {{ stack.name }}"
  ansible.builtin.copy:
    content: "{{ env_content.stdout }}"
    dest: "{{ docker_compose_base_dir }}/{{ stack.name }}/.env"
    mode: "0600"
    owner: root
    group: root
  when: env_tpl_path is defined

- name: "Copy compose.yaml for {{ stack.name }}"
  ansible.builtin.copy:
    src: "{{ role_path }}/templates/{{ stack.name }}/compose.yaml"
    dest: "{{ docker_compose_base_dir }}/{{ stack.name }}/compose.yaml"
    mode: "0644"
    owner: root
    group: root

- name: "Copy config files for {{ stack.name }}"
  ansible.builtin.copy:
    src: "{{ role_path }}/templates/{{ stack.name }}/{{ item }}"
    dest: "{{ docker_compose_base_dir }}/{{ stack.name }}/{{ item }}"
    mode: "0644"
    owner: root
    group: root
  loop: "{{ stack.configs | default([]) | reject('match', '.*\\.tpl$') | list }}"

- name: "Inject secrets into config templates for {{ stack.name }}"
  ansible.builtin.command:
    cmd: op inject -i "{{ role_path }}/templates/{{ stack.name }}/{{ item }}"
  register: config_tpl_contents
  delegate_to: localhost
  become: false
  changed_when: false
  loop: "{{ stack.configs | default([]) | select('match', '.*\\.tpl$') | list }}"

- name: "Create config files from templates for {{ stack.name }}"
  ansible.builtin.copy:
    content: "{{ item.stdout }}"
    dest: "{{ docker_compose_base_dir }}/{{ stack.name }}/{{ item.item | regex_replace('\\.tpl$', '') }}"
    mode: "0600"
    owner: root
    group: root
  loop: "{{ config_tpl_contents.results | default([]) }}"
  when: config_tpl_contents.results | default([]) | length > 0

- name: "Start {{ stack.name }} stack"
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_base_dir }}/{{ stack.name }}"
    state: present
    pull: always
  register: stack_result

- name: "Display {{ stack.name }} deployment status"
  ansible.builtin.debug:
    msg: "Stack {{ stack.name }} deployed successfully"
  when: stack_result.changed

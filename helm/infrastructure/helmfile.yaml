---
helmDefaults:
  wait: true
  waitForJobs: true
  timeout: 600

repositories:
  - name: metallb
    url: https://metallb.github.io/metallb
  - name: istio
    url: https://istio-release.storage.googleapis.com/charts
  - name: jetstack
    url: https://charts.jetstack.io
  - name: longhorn
    url: https://charts.longhorn.io

releases:
  - name: metallb
    namespace: metallb-system
    createNamespace: true
    chart: metallb/metallb
    version: 0.15.3
    values:
      - values/metallb.yml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: kubectl
        args:
          - apply
          - -f
          - resources/metallb.yml
      - events: ["preuninstall"]
        showlogs: true
        command: kubectl
        args:
          - delete
          - -f
          - resources/metallb.yml

  - name: istio-base
    namespace: istio-system
    createNamespace: true
    chart: istio/base
    version: 1.28.2

  - name: istiod
    namespace: istio-system
    chart: istio/istiod
    version: 1.28.2
    needs:
      - istio-base
    set:
      - name: profile
        value: ambient

  - name: istio-cni
    namespace: istio-system
    chart: istio/cni
    version: 1.28.2
    needs:
      - istio-base
    set:
      - name: profile
        value: ambient
      - name: chained
        value: false

  - name: ztunnel
    namespace: istio-system
    chart: istio/ztunnel
    version: 1.28.2
    needs:
      - istio-base

  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: jetstack/cert-manager
    version: 1.19.2
    set:
      - name: crds.enabled
        value: true
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: kubectl
        args:
          - apply
          - -f
          - resources/cert-manager.yml
      - events: ["preuninstall"]
        showlogs: true
        command: kubectl
        args:
          - delete
          - -f
          - resources/cert-manager.yml

  - name: istio-ingress
    namespace: istio-ingress
    createNamespace: true
    chart: istio/gateway
    version: 1.28.2
    needs:
      - metallb-system/metallb
      - istio-system/ztunnel
      - cert-manager/cert-manager

  - name: longhorn
    namespace: longhorn-system
    createNamespace: true
    chart: longhorn/longhorn
    version: 1.10.1

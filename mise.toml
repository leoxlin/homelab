[tools]
"flux2" = "2.7.5"
"helm" = "4.0.4"
istioctl = "latest"
"kubeconform" = "latest"
"pipx" = "latest"
"pipx:ansible" = "13.2.0"
"pipx:ansible-lint" = "latest"
"pipx:yamllint" = "latest"

[tasks.setup]
description = "Setup environment"
depends = ["setup-ansible"]

[tasks.setup-ansible]
run = "mise exec -- ansible-galaxy install -r requirements.yml"
dir = "ansible"

[tasks.lint]
description = "Run all linters"
depends = [
  "lint-ansible",
  "lint-flux",
]

[tasks.lint-ansible]
run = [
  "mise exec -- yamllint .",
  "mise exec -- ansible-lint .",
]
dir = "ansible"

[tasks.lint-flux]
description = "Lint FluxCD manifests"
run = [
  "mise exec -- yamllint .",
  "mise exec -- flux build kustomization system --path . --kustomization-file system.yaml --dry-run",
  "mise exec -- flux build kustomization infrastructure --path . --kustomization-file infrastructure.yaml --dry-run",
  "mise exec -- flux build kustomization database --path . --kustomization-file database.yaml --dry-run",
  "mise exec -- flux build kustomization application --path . --kustomization-file application.yaml --dry-run",
]
dir = "flux"

[tasks.ansible]
description = "Run an ansible playbook"
usage = '''
arg "<playbook>"
'''
run = "mise exec -- ansible-playbook playbooks/${usage_playbook}.yml"
dir = "ansible"
alias = "a"

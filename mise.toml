[tools]
"flux2" = "2.7.5"
"helm" = "4.0.4"
"kubeconform" = "latest"
"pipx" = "latest"
"pipx:ansible" = "13.2.0"
"pipx:ansible-lint" = "latest"
"pipx:yamllint" = "latest"

[tasks.setup]
description = "Setup environment"
depends = ["setup-ansible"]

[tasks.setup-ansible]
run = "mise exec -- ansible-galaxy install -r requirements.yml"
dir = "ansible"

[tasks.lint]
description = "Run all linters"
depends = [
  "lint-ansible",
  "lint-flux",
]

[tasks.lint-ansible]
run = [
  "mise exec -- yamllint .",
  "mise exec -- ansible-lint .",
]
dir = "ansible"

[tasks.lint-flux]
description = "Lint FluxCD manifests"
run = [
  "mise exec -- yamllint .",
  "mise exec -- kubeconform -strict -ignore-missing-schemas -schema-location default -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{\"{{\"}}.Group{{\"}}\"}}/{{\"{{\"}}.ResourceKind{{\"}}\"}}_{{\"{{\"}}.ResourceAPIVersion{{\"}}\"}}.json' -summary .",
  "mise exec -- flux build kustomization flux-system --path . --dry-run",
]
dir = "flux"

[tasks.ansible]
description = "Run an ansible playbook"
usage = '''
arg "<playbook>"
'''
run = "mise exec -- ansible-playbook playbooks/${usage_playbook}.yml"
dir = "ansible"
alias = "a"

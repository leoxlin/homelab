[env]
SSH_AUTH_SOCK = "{{env.HOME}}/.1password/agent.sock"

[tools]
"flux2" = "2.7.5"
"helm" = "4.0.4"
istioctl = "latest"
"kubeconform" = "latest"
"pipx" = "latest"
"pipx:ansible" = "13.2.0"
"pipx:ansible-core" = "2.20.6"
"pipx:ansible-lint" = "latest"
"pipx:yamllint" = "latest"
"yq" = "4.53.3"

[tasks.setup]
description = "Setup environment"
depends = ["setup-ansible"]

[tasks.setup-ansible]
run = [
  "mise exec -- ansible-galaxy install -r requirements.yaml",
  "mise exec -- pip3 install paramiko",
]
dir = "ansible"

[tasks.lint]
description = "Run all linters"
depends = [
  "lint-ansible",
  "lint-flux",
]

[tasks.lint-ansible]
run = [
  "mise exec -- yamllint .",
  "mise exec -- ansible-lint .",
]
dir = "ansible"

[tasks.lint-flux]
description = "Lint FluxCD manifests"
run = [
  "mise exec -- yamllint .",
  '''
  yq -r '.resources[]' kustomization.yaml | while IFS= read -r kustomization_file; do
    name="$(yq -r 'select(.apiVersion == "kustomize.toolkit.fluxcd.io/v1" and .kind == "Kustomization") | .metadata.name' "$kustomization_file")"
    path="$(yq -r 'select(.apiVersion == "kustomize.toolkit.fluxcd.io/v1" and .kind == "Kustomization") | .spec.path' "$kustomization_file")"
    path="${path#./flux/}"
    mise exec -- flux build kustomization "$name" --path "$path" --kustomization-file "$kustomization_file" --dry-run
  done
  ''',
]

dir = "flux"

[tasks.ansible]
description = "Run an ansible playbook"
usage = '''
arg "<playbook>"
flag "--host <host>" help="Limit execution to a specific host or group"
'''
run = "mise exec -- ansible-playbook playbooks/${usage_playbook}.yaml ${usage_host:+--limit $usage_host}"
dir = "ansible"
alias = "a"

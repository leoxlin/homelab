[tools]
"pipx" = "latest"
"pipx:ansible-lint" = "latest"
"pipx:yamllint" = "latest"
"pipx:ansible" = "13.2.0"

[tasks.lint]
description = "Run all linters"
depends = ["lint-ansible"]

[tasks.lint-ansible]
description = "Run ansible linters"
run = [
  "mise exec -- yamllint .",
  "mise exec -- ansible-lint .",
]
dir = "ansible"

name: hydra-hmlb
prefect-version: 3.6.5

build: null

push: null

pull:
  - prefect.deployments.steps.git_clone:
      repository: https://github.com/leoxlin/hydra-hmlb.git
      branch: main
      access_token: "{{ prefect.blocks.secret.github-access-token }}"

# the deployments section allows you to provide configuration for deploying flows
deployments:
  - entrypoint: flows/snapraid.py:snapraid
    description: "Run snapraid sync to ensure parity"
    name: sync
    schedule: {}
    parameters:
      mode: sync
      snapraid_conf: /etc/snapraid/union-01.conf
    work_pool:
      name: metal-local
      job_variables: {}

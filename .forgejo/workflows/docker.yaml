name: Build Docker images

on:
  push:
    branches:
      - main
    paths:
      - docker/**
      - .forgejo/workflows/docker.yaml
  workflow_dispatch:

jobs:
  # Discover all docker/<name>/Dockerfile entries and emit them as a JSON array
  # so the publish job can fan out one matrix leg per image.
  discover:
    runs-on: docker
    container:
      image: ghcr.io/catthehacker/ubuntu:act-22.04
    outputs:
      images: ${{ steps.list.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: List images
        id: list
        run: |
          images=$(find docker -mindepth 2 -maxdepth 2 -name Dockerfile \
            | sed 's|docker/||; s|/Dockerfile||' | sort \
            | python3 -c "import sys, json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))")
          echo "images=$images" >> "$GITHUB_OUTPUT"

  # Job containers get /var/run/docker.sock bind-mounted by the runner (docker_host
  # config). driver: docker uses the daemon's built-in BuildKit — no separate
  # BuildKit container, so no connectivity issues.
  publish:
    needs: discover
    if: needs.discover.outputs.images != '[]'
    runs-on: docker
    container:
      image: ghcr.io/catthehacker/ubuntu:act-22.04
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
        with:
          driver: docker

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: docker/${{ matrix.image }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}

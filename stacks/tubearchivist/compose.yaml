name: tubearchivist

services:
  tubearchivist:
    container_name: tubearchivist
    restart: unless-stopped
    image: bbilly1/tubearchivist
    ports:
      - 8000:8000
    volumes:
      - /share/docker/tubearchivist/cache:/cache
      - /srv/mergerfs/union_01/media/YouTube:/youtube
    environment:
      - HOST_UID=1121
      - HOST_GID=1121
      - ES_URL=http://tubearchivist-es:9200
      - REDIS_CON=redis://tubearchivist-redis:6379
      - TA_HOST=http://tubearchivist.local:8000
      - TA_USERNAME=admin
      - TA_PASSWORD=${TA_ADMIN_PASSWORD}
      - ELASTIC_PASSWORD={TA_ES_PASSWORD}
      - TZ=America/New_York
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - tubearchivist-es
      - tubearchivist-redis

  tubearchivist-redis:
    image: redis
    container_name: tubearchivist-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - /share/docker/tubearchivist/redis:/data
    depends_on:
      - archivist-es

  tubearchivist-es:
    image: bbilly1/tubearchivist-es
    container_name: tubearchivist-es
    restart: unless-stopped
    environment:
      - "ELASTIC_PASSWORD=${TA_ES_PASSWORD}"
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - "xpack.security.enabled=true"
      - "discovery.type=single-node"
      - "path.repo=/usr/share/elasticsearch/data/snapshot"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - /share/docker/tubearchivist/elasticsearch:/usr/share/elasticsearch/data
    expose:
      - "9200"

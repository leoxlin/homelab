name: tubearchivist

networks:
  application:
    name: tubearchivist
  proxy:
    name: proxy
    external: true

services:
  tubearchivist:
    container_name: tubearchivist
    restart: unless-stopped
    image: bbilly1/tubearchivist
    networks:
      - application
      - proxy
    volumes:
      - /share/docker/tubearchivist/cache:/cache
      - /srv/mergerfs/union_01/media/YouTube:/youtube
    environment:
      - HOST_UID=1121
      - HOST_GID=1121
      - ES_URL=http://tubearchivist-es:9200
      - REDIS_CON=redis://tubearchivist-redis:6379
      - TA_HOST=http://tubearchivist.local:8000
      - TA_USERNAME=admin
      - TA_PASSWORD=${TA_ADMIN_PASSWORD}
      - ELASTIC_PASSWORD={TA_ES_PASSWORD}
      - TZ=America/New_York
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - tubearchivist-es
      - tubearchivist-redis
    labels:
      - "traefik.enable=true"

  tubearchivist-redis:
    image: redis
    container_name: tubearchivist-redis
    user: 1120:1120
    restart: unless-stopped
    networks:
      - application
    volumes:
      - /share/docker/tubearchivist/redis:/data
    depends_on:
      - tubearchivist-es

  tubearchivist-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.2
    container_name: elasticsearch
    environment:
      - ELASTIC_PASSWORD=${TA_ES_PASSWORD}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    networks:
      - application
    volumes:
      - /share/docker/tubearchivist/es:/usr/share/elasticsearch/data

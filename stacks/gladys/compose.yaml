name: gladys

services:
  gladys:
    image: gladysassistant/gladys:v4
    container_name: gladys
    restart: always
    privileged: true
    network_mode: host
    cgroup: host
    logging:
      driver: "json-file"
      options:
        max-size: 10m
    environment:
      NODE_ENV: production
      SQLITE_FILE_PATH: /var/lib/gladysassistant/gladys-production.db
      SERVER_PORT: 5080
      TZ: America/New_York
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /share/docker/gladys/db:/var/lib/gladysassistant
      - /dev:/dev
      - /run/udev:/run/udev:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gladys.rule=Host(`gladys.hydrahmlb.cc`)"
      - "traefik.http.services.gladys.loadbalancer.server.port=5080"
  watchtower:
    image: nickfedor/watchtower
    restart: always
    container_name: watchtower
    command: --cleanup --include-restarting
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

# Server URL
grails.serverURL=https://rundeck.hydrahmlb.cc

# Forwarded headers support
server.useForwardHeaders=true

# Session settings
server.session.timeout=1800
server.session.cookie.max-age=1800
server.session.cookie.http-only=true
server.session.cookie.secure=false

# Context path
server.contextPath=/

# Address binding
server.address=0.0.0.0
server.port=4440

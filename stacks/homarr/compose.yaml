name: homarr

networks:
  proxy:
    name: proxy
    external: true

services:
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
      - /share/docker/homarr:/appdata
    environment:
      - BASE_URL=cc.hydrahmlb.cc
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY}
      - DEFAULT_COLOR_SCHEME=dark
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homarr.rule=Host(`cc.hydrahmlb.cc`)"
      - "traefik.http.services.homarr.loadBalancer.server.port=3000"

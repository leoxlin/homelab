networks:
  application:
    name: komodo
  proxy:
    name: proxy
    external: true

services:
  komodo-db:
    image: ghcr.io/ferretdb/postgres-documentdb:${COMPOSE_DATABASE_IMAGE_TAG:-latest}
    user: 1000:1000
    container_name: komodo-db
    restart: unless-stopped
    volumes:
      - /share/docker/komodo/db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${KOMODO_DB_USERNAME}
      POSTGRES_PASSWORD: ${KOMODO_DB_PASSWORD}
      POSTGRES_DB: postgres
    networks:
      - application
    labels:
      - "komodo.skip=" # Exclude from Komodo

  komodo-ferret:
    image: ghcr.io/ferretdb/ferretdb:${COMPOSE_FERRET_IMAGE_TAG:-latest}
    user: 1000:1000
    container_name: komodo-ferret
    restart: unless-stopped
    depends_on:
      - komodo-db
    volumes:
      - /share/docker/komodo/ferret:/state
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://${KOMODO_DB_USERNAME}:${KOMODO_DB_PASSWORD}@komodo-db:5432/postgres
    networks:
      - application
    labels:
      - "komodo.skip=" # Exclude from Komodo

  komodo:
    image: ghcr.io/moghtech/komodo-core:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    container_name: komodo
    restart: unless-stopped
    depends_on:
      - komodo-ferret
    ports:
      - 9120:9120
    env_file: komodo.env
    environment:
      KOMODO_DATABASE_ADDRESS: komodo-ferret:27017
      KOMODO_DATABASE_USERNAME: ${KOMODO_DB_USERNAME}
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DB_PASSWORD}
    volumes:
      # Store dated backups of the database
      - /share/docker/komodo/backups:/backups
      # Store sync files on server
      - /share/docker/komodo/syncs:/syncs
      # Store the core.config.toml file here
      - /share/docker/komodo/config:/config
    networks:
      - application
      - proxy
    labels:
      - "komodo.skip=" # Exclude from Komodo
      - "traefik.enable=true"

  komodo-periphery:
    image: ghcr.io/moghtech/komodo-periphery:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    container_name: komodo-periphery
    restart: unless-stopped
    env_file: komodo.env
    volumes:
      ## Mount external docker socket
      - /var/run/docker.sock:/var/run/docker.sock
      ## Allow Periphery to see processes outside of container
      - /proc:/proc
      ## Specify the Periphery agent root directory.
      ## Must be the same inside and outside the container,
      ## or docker will get confused. See https://github.com/moghtech/komodo/discussions/180.
      ## Default: /etc/komodo.
      - ${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}:${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}
    networks:
      - application
    labels:
      - "komodo.skip=" # Exclude from Komodo

[server]
hidden_host          =
port                 = 8080
bind                 = 0.0.0.0
tls_cert_path        =
tls_key_path         =
autocert             = false
templates_parent_dir =
static_parent_dir    =
pages_parent_dir     =
keys_parent_dir      =
hash_seed            =
gopher_port          = 0

[database]
type     = sqlite3
filename = data/writefreely.db
username =
password =
database =
host     = localhost
port     = 3306
tls      = false

[app]
site_name             = ${WF_SITE_NAME:-Homelab Blog}
site_description      = ${WF_SITE_DESCRIPTION:-Homelab Hosted Blog}
host                  = ${WF_HOST:-http://localhost:8080}
theme                 = write
editor                =
disable_js            = false
webfonts              = true
landing               =
simple_nav            = false
wf_modesty            = false
chorus                = false
forest                = false
disable_drafts        = false
single_user           = true
open_registration     = false
open_deletion         = false
min_username_len      = 3
max_blogs             = 1
federation            = false
public_stats          = false
monetization          = false
notes_only            = false
private               = false
local_timeline        = false
user_invites          =
default_visibility    =
update_checks         = false
disable_password_auth = false

[email]
smtp_host             =
smtp_port             = 0
smtp_username         =
smtp_password         =
smtp_enable_start_tls = false
domain                =
mailgun_private       =
mailgun_europe        = false

[oauth.generic]
client_id          = ${WF_OAUTH_CLIENT_ID:-}
client_secret      = ${WF_OAUTH_CLIENT_SECRET:-}
host               = ${WF_OAUTH_HOST:-}
display_name       = ${WF_OAUTH_DISPLAY_NAME:-}
callback_proxy     = ${WF_OAUTH_CALLBACK_PROXY:-}
callback_proxy_api = ${WF_OAUTH_CALLBACK_PROXY_API:-}
token_endpoint     = ${WF_OAUTH_TOKEN_ENDPOINT:-}
inspect_endpoint   = ${WF_OAUTH_INSPECT_ENDPOINT:-}
auth_endpoint      = ${WF_OAUTH_AUTH_ENDPOINT:-}
scope              = ${WF_OAUTH_SCOPE:-}
allow_disconnect   = ${WF_OAUTH_ALLOW_DISCONNECT:-false}
map_user_id        = ${WF_OAUTH_MAP_USER_ID:-}
map_username       = ${WF_OAUTH_MAP_USERNAME:-}
map_display_name   = ${WF_OAUTH_MAP_DISPLAY_NAME:-}
map_email          = ${WF_OAUTH_MAP_EMAIL:-}

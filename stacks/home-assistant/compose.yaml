name: home-assistant

services:
  home-assistant:
    container_name: home-assistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - /share/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      TZ: America/New_York
    cap_add:
      - NET_ADMIN
      - NET_RAW
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.home-https.rule=Host(`home.hydrahmlb.cc`)"
      - "traefik.http.services.home.loadbalancer.server.port=8123"
